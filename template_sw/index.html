<!DOCTYPE html>
<html>
<body>
    <input type="file" id="folderInput" webkitdirectory directory multiple />
    <iframe id="viewer" style="width:100%; height:90vh;"></iframe>

    <script>
        // 1. Register and wait for the SW to be active
        async function setupSW() {
            if ('serviceWorker' in navigator) {
                const registration = await navigator.serviceWorker.register('sw.js');
                // Wait for the service worker to be ready
                await navigator.serviceWorker.ready;
                return registration;
            }
        }
        setupSW();

        document.getElementById('folderInput').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            
            // 2. Ensure we have a controller (the active SW)
            if (!navigator.serviceWorker.controller) {
                // If not controlling, reload the page to kickstart the SW
                // This usually only happens on the very first visit
                location.reload();
                return;
            }

            const payload = files.map(file => ({
                path: file.webkitRelativePath,
                blob: file
            }));

            // 3. Send files to the proxy
            navigator.serviceWorker.controller.postMessage({
                type: 'REGISTER_FILES',
                files: payload
            });

            // 4. Load the first HTML file
            const entry = files.find(f => f.name === '_readable.html') || files[0];
            
            // Small delay to let the SW process the message
            setTimeout(() => {
                // IMPORTANT: Use the root-relative path
                document.getElementById('viewer').src = '/' + entry.webkitRelativePath;
            }, 50);
        });
    </script>
</body>
</html>
