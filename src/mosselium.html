<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>MOSS Similarity Graph</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="css/mosselium.css">
    <link rel="stylesheet" href="css/previews.css">
</head>
<!-- ------------------------------------------------ -->
<body>
    <div id="controls" data-side="left">
        <h3 style="margin:0 0 10px 0; font-size: 16px; color: var(--accent);">MOSSelium</h3>
        <input type="file" id="folderInput" webkitdirectory directory multiple style="display: none;" />
        <button id="uploadBtn">Upload MOSS Folder</button>
        <select id="topLinks"><option value="">-- Jump to Match --</option></select>
        <div style="display: flex; flex-direction: column; gap: 15px; align-items: center;">
            <button id="resetBtn" style="font-size: 11px; border: none; color: #fff;">Reset View</button>
            <div style="display: flex; gap: 15px; align-items: center; justify-content: center;">
                <input type="range" id="previewScale" min="0.25" max="1" step="0.05" value="0.4" autocomplete="off" style="height: 14px; width: 50%;">
                <label for="previewScale" style="font-size: 11px; color: #fff;">Preview Scale:</label>
            </div>
            <div style="display: flex; gap: 15px; align-items: center; justify-content: center;">
                <input type="checkbox" id="autoRecenter" checked autocomplete="off">
                <label for="autoRecenter" style="font-size: 11px; color: #fff;">Automatic Recentering:</label>
            </div>
        </div>
        <div id="shortcuts-info" style="font-size: 10px; color: #aaa; margin-top: 12px; line-height: 1.4; border-top: 1px solid #444; padding-top: 8px;"></div>
    </div>

    <div id="tooltip"></div>
    <div id="preview-window" data-side="right">
        <div class="preview-resize-handle"></div>
        <div class="preview-frame-wrapper">
            <iframe id="preview-frame" src="about:blank"></iframe>
        </div>
    </div>

    <svg id="graph"></svg>

    <script src="js/globals.js"></script>
    <script src="js/parsingUtils.js"></script>
    <script src="js/previews.js"></script>
    <script src="js/mosselium.js"></script>
</body>
</html>
